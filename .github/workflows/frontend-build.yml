# Build the RemoteTerminal frontend only when frontend code changes.
# Artifacts can be downloaded from the Actions tab; on push to main, also published to release "frontend-latest" for the Pi install script.
name: Frontend build

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, master]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

  # Publish to release so the Pi install script can download without auth (push to main/master or manual run from main).
  publish-release:
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    main
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
    main

      - name: Zip for release asset
        run: |
          zip -r frontend-dist.zip .
        working-directory: frontend-dist

      - name: Create or update frontend-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view frontend-latest 2>/dev/null; then
            gh release create frontend-latest --target ${{ github.ref_name }} --title "Prebuilt frontend (latest from main)" --generate-notes
          fi
    main
